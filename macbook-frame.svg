<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="100%" height="100%">
  <defs>
    <linearGradient id="lid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3c"/>
      <stop offset="50%" style="stop-color:#2a2a2c"/>
      <stop offset="100%" style="stop-color:#1c1c1e"/>
    </linearGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="50%" style="stop-color:#c0c0c0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <linearGradient id="screen-frame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2c"/>
      <stop offset="100%" style="stop-color:#1a1a1c"/>
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="-10" dy="25" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="600" cy="670" rx="450" ry="15" fill="#000" opacity="0.08"/>
  
  <!-- Screen lid (angled) -->
  <g transform="skewY(-3) translate(0, -10)">
    <!-- Outer frame -->
    <rect x="180" y="40" width="840" height="530" rx="14" fill="url(#lid)" stroke="#48484a" stroke-width="1"/>
    <!-- Inner screen area -->
    <rect x="194" y="54" width="812" height="502" rx="4" fill="url(#screen-frame)"/>
    <!-- Screen content placeholder -->
    <clipPath id="screenClip">
      <rect x="195" y="55" width="810" height="500" rx="3"/>
    </clipPath>
    <!-- Camera dot -->
    <circle cx="600" cy="48" r="3" fill="#0a0a0a"/>
  </g>
  
  <!-- Hinge -->
  <rect x="170" y="568" width="860" height="6" rx="3" fill="#666"/>
  
  <!-- Base/keyboard deck -->
  <path d="M 120,574 L 1080,574 L 1120,640 L 80,640 Z" fill="url(#base)" stroke="#999" stroke-width="0.5"/>
  <!-- Trackpad notch -->
  <ellipse cx="600" cy="612" rx="60" ry="4" fill="#909090" opacity="0.6"/>
</svg>
