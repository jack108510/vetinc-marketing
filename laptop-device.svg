<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" width="100%" height="100%">
  <defs>
    <linearGradient id="bezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38383a"/>
      <stop offset="50%" stop-color="#28282a"/>
      <stop offset="100%" stop-color="#1a1a1c"/>
    </linearGradient>
    <linearGradient id="deck" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8d8d8"/>
      <stop offset="40%" stop-color="#c4c4c4"/>
      <stop offset="100%" stop-color="#a8a8a8"/>
    </linearGradient>
    <linearGradient id="deckFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b8b8b8"/>
      <stop offset="100%" stop-color="#969696"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="-6" dy="22" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Floor shadow -->
  <ellipse cx="550" cy="670" rx="450" ry="10" fill="#000" opacity="0.05"/>

  <g filter="url(#shadow)">
    <!-- ===== SCREEN ===== -->
    <g transform="skewY(-1.8)">
      <!-- Outer frame -->
      <rect x="130" y="20" width="840" height="520" rx="14" fill="url(#bezel)"/>
      <!-- Screen recess -->
      <rect x="140" y="30" width="820" height="500" rx="4" fill="#000"/>
      <!-- Dashboard screenshot -->
      <image x="140" y="30" width="820" height="500" href="dashboard-full.png" preserveAspectRatio="xMidYMin slice"/>
      <!-- Subtle glare -->
      <rect x="130" y="20" width="840" height="520" rx="14" fill="white" opacity="0.02"/>
      <!-- Camera -->
      <circle cx="550" cy="26" r="3" fill="#0a0a0a"/>
    </g>

    <!-- ===== HINGE ===== -->
    <rect x="128" y="542" width="844" height="5" fill="#777"/>

    <!-- ===== SLIM BASE (MacBook style - thin wedge) ===== -->
    <!-- Main thin deck -->
    <path d="M 120,547 L 980,547 L 1040,610 L 60,610 Z" fill="url(#deck)"/>
    <!-- Front lip -->
    <path d="M 60,610 L 1040,610 L 1045,620 L 55,620 Z" fill="url(#deckFront)"/>
    <!-- Trackpad (subtle, barely visible) -->
    <path d="M 440,560 L 660,560 L 670,595 L 430,595 Z" fill="#d0d0d0" opacity="0.4"/>
    <!-- Notch -->
    <rect x="520" y="612" width="60" height="4" rx="2" fill="#909090"/>
  </g>
</svg>
