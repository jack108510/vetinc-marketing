<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 620" width="100%" height="100%">
  <defs>
    <linearGradient id="pFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2c"/>
      <stop offset="50%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#161618"/>
    </linearGradient>
    <linearGradient id="pEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="50%" stop-color="#444"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <filter id="pShadow" x="-15%" y="-5%" width="130%" height="115%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="-5" dy="15" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <g filter="url(#pShadow)">
    <!-- Side buttons -->
    <rect x="288" y="120" width="4" height="35" rx="1" fill="#444"/>
    <rect x="288" y="165" width="4" height="55" rx="1" fill="#444"/>
    <rect x="288" y="230" width="4" height="55" rx="1" fill="#444"/>
    <rect x="8" y="150" width="4" height="30" rx="1" fill="#444"/>
    
    <!-- Phone body -->
    <rect x="12" y="10" width="276" height="600" rx="32" ry="32" fill="url(#pFrame)"/>
    <!-- Inner bezel -->
    <rect x="18" y="16" width="264" height="588" rx="26" ry="26" fill="#0a0a0a"/>
    <!-- Screen -->
    <rect x="22" y="20" width="256" height="580" rx="22" ry="22" fill="#000"/>
    <!-- Dashboard screenshot -->
    <image x="22" y="20" width="256" height="580" href="dashboard-preview.png" preserveAspectRatio="xMidYMin slice"/>
    <!-- Dynamic island / notch -->
    <rect x="100" y="20" width="100" height="26" rx="13" ry="13" fill="#000"/>
    <circle cx="185" cy="33" r="4" fill="#111"/>
  </g>
</svg>
